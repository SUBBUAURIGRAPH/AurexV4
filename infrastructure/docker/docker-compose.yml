# ADM-020: Non-root users, resource limits
# ADM-043: Host bind-mounts for web deploy
version: "3.8"

services:
  aurex-db:
    image: postgres:16-alpine
    container_name: aurexv4-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-aurex}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-aurexv4}
    volumes:
      - aurex-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aurex} -d ${DB_NAME:-aurexv4}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  aurex-redis:
    image: redis:7-alpine
    container_name: aurexv4-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  aurex-api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: aurexv4-api
    restart: unless-stopped
    depends_on:
      aurex-db:
        condition: service_healthy
      aurex-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-aurex}:${DB_PASSWORD}@aurex-db:5432/${DB_NAME:-aurexv4}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@aurex-redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET required}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://aurex.in,https://www.aurex.in}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/api/v1/health').then(r=>{if(!r.ok)throw 1})\""]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  aurex-nginx:
    image: nginx:alpine
    container_name: aurexv4-nginx
    restart: unless-stopped
    depends_on:
      aurex-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # ADM-043: Bind-mount web assets from host
      - ${WEB_DIST_PATH:-../../apps/web/dist}:/usr/share/nginx/html:ro
      - ../nginx/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_PATH:-/etc/letsencrypt/live/aurex.in/fullchain.pem}:/etc/ssl/certs/aurex.crt:ro
      - ${SSL_KEY_PATH:-/etc/letsencrypt/live/aurex.in/privkey.pem}:/etc/ssl/private/aurex.key:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

volumes:
  aurex-pgdata:
