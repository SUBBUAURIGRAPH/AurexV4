name: HMS Deploy to Remote Server

on:
  workflow_run:
    workflows: ["HMS Docker Build & Push"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      deploy_type:
        description: 'Deployment type'
        required: true
        default: 'docker-compose'
        type: choice
        options:
          - docker-compose
          - docker-swarm
          - kubernetes

env:
  REGISTRY: docker.io
  IMAGE_NAME: aurigraph/hms-j4c-agent

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_TYPE: ${{ github.event.inputs.deploy_type || 'docker-compose' }}
          ENV_TYPE: ${{ github.event.inputs.environment || 'staging' }}
        run: |
          bash -s $DEPLOY_HOST $DEPLOY_USER $DEPLOY_TYPE < deploy-to-remote.sh

      - name: Verify deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
        run: |
          ssh -p $DEPLOY_PORT $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            echo "Checking service health..."
            cd /opt/hms

            # Check Docker Compose status
            docker-compose ps || echo "Docker Compose not available"

            # Check Docker Stack status (Swarm)
            docker stack ps hms || echo "Docker Stack not available"

            # Test agent health endpoint
            curl -f http://localhost:9003/health || echo "Agent health check pending"

            # Check database connectivity
            docker exec hms-postgres pg_isready -U hms_user || echo "Database check pending"
          EOF

      - name: Notify deployment status
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "HMS Deployment ${{ job.status == 'success' && 'Successful' || 'Failed' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅' || '❌' }} HMS Deployment *${{ job.status == 'success' && 'Successful' || 'Failed' }}*\n\nEnvironment: ${{ github.event.inputs.environment || 'staging' }}\nType: ${{ github.event.inputs.deploy_type || 'docker-compose' }}\nHost: ${{ secrets.DEPLOY_HOST }}"
                  }
                }
              ]
            }

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Wait for services to stabilize
        run: sleep 30

      - name: Health check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          echo "Checking service health..."

          # Check agent health
          curl -f http://$DEPLOY_HOST:9003/health && echo "✅ Agent is healthy" || echo "❌ Agent health check failed"

          # Check Prometheus
          curl -f http://$DEPLOY_HOST:9090/-/healthy && echo "✅ Prometheus is healthy" || echo "❌ Prometheus health check failed"

          # Check Grafana
          curl -f http://$DEPLOY_HOST:3000/api/health && echo "✅ Grafana is healthy" || echo "❌ Grafana health check failed"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."

          # Test API connectivity
          curl -X GET http://${{ secrets.DEPLOY_HOST }}:9003/agents -v

          # Check metrics endpoint
          curl -X GET http://${{ secrets.DEPLOY_HOST }}:9090/api/v1/query?query=up
