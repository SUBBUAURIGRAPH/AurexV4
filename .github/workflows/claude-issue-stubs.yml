# AV4-405 / AAT-405 — Issue → Stub PR Scaffolder
#
# When an issue is opened or labeled with `claude-stub`, the Claude Code CLI
# scaffolds a stub implementation and opens a draft PR cross-linking the issue.
#
# Required GitHub Actions secrets:
#   ANTHROPIC_API_KEY  - Anthropic API key with Claude Code CLI access (P1)
#   GH_TOKEN           - GitHub token with PR + contents:write scope (or use
#                        the default GITHUB_TOKEN if it already has those scopes)
#
# Trigger:
#   - issues: opened (auto-runs only if the `claude-stub` label is present)
#   - issues: labeled with name == 'claude-stub'
#
name: Claude Issue Stub Scaffolder

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  scaffold:
    name: Scaffold stub PR
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'claude-stub') ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'claude-stub'))
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config user.name "claude-stub-bot"
          git config user.email "claude-stub-bot@aurigraph.io"

      - name: Create branch
        id: branch
        run: |
          BRANCH="claude/stub-issue-${{ github.event.issue.number }}"
          git checkout -B "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run Claude scaffold
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          {
            echo "Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
            echo
            echo "${ISSUE_BODY:-(no body)}"
          } > issue.txt
          claude -p "Scaffold a stub implementation for this issue. Create the minimal files (interfaces, route stubs, types, test placeholders) needed so a developer can pick it up. Return a JSON manifest of files created. Issue follows:" \
            --output-format json \
            --allowed-tools "read,write" \
            --system-prompt "You are the Aurigraph V4 protocol architect. Scaffold concise, idiomatic stubs that match the existing AurexV4 monorepo conventions (pnpm, TypeScript strict, RFC 7807 errors, /api/v1 routes)." \
            < issue.txt \
            > claude-scaffold.json || true

      - name: Commit scaffold
        id: commit
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes scaffolded; skipping PR."
          else
            git commit \
              -m "feat(stub): scaffold for issue #${{ github.event.issue.number }}" \
              -m "Auto-generated by Claude Code CLI." \
              -m "Refs #${{ github.event.issue.number }}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch
        if: steps.commit.outputs.changed == 'true'
        run: git push -u origin "${{ steps.branch.outputs.branch }}"

      - name: Open draft PR
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --draft \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "[stub] ${{ github.event.issue.title }}" \
            --body "$(cat <<'EOF'
          Auto-scaffolded by Claude Code CLI in response to issue #${{ github.event.issue.number }}.

          - Trigger: \`claude-stub\` label
          - Workflow: \`.github/workflows/claude-issue-stubs.yml\`
          - Manifest: see workflow artifact \`claude-scaffold.json\`

          Closes #${{ github.event.issue.number }}
          EOF
          )"

      - name: Upload scaffold manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-scaffold-issue-${{ github.event.issue.number }}
          path: |
            claude-scaffold.json
            issue.txt
          if-no-files-found: ignore
          retention-days: 30
