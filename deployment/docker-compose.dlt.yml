version: '3.9'

services:
  # Aurigraph DLT Node - Main DLT Service
  dlt-node:
    image: node:18-alpine
    container_name: aurigraph-dlt-node
    working_dir: /app/dlt
    volumes:
      - ./dlt-service:/app/dlt
      - dlt-node-logs:/app/dlt/logs
      - dlt-node-data:/app/dlt/data
    environment:
      - NODE_ENV=production
      - DLT_PORT=9004
      - DLT_NETWORK=${DLT_NETWORK:-testnet}
      - DLT_API_URL=${DLT_API_URL:-https://api.aurigraph.io}
      - DLT_API_KEY=${DLT_API_KEY}
      - DLT_API_SECRET=${DLT_API_SECRET}
      - LOG_LEVEL=info
      - AURIGRAPH_CONSOLE_URL=${AURIGRAPH_CONSOLE_URL:-https://console.aurigraph.io/api-keys}
    command: sh -c "npm install && node index.js"
    ports:
      - "9004:9004"
    networks:
      - dlt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9004', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.hermes.description=Aurigraph DLT Node"
      - "com.hermes.version=1.0.0"
    depends_on:
      - dlt-postgres

  # NGINX Reverse Proxy for DLT
  dlt-nginx:
    image: nginx:alpine
    container_name: dlt-nginx-proxy
    ports:
      - "9443:443"
      - "9080:80"
    volumes:
      - ./nginx-dlt.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/aurexcrt1:/etc/nginx/ssl:ro
      - dlt-nginx-logs:/var/log/nginx
      - dlt-nginx-cache:/var/cache/nginx
    networks:
      - dlt-network
    depends_on:
      - dlt-node
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.hermes.description=DLT NGINX Reverse Proxy with SSL"
    environment:
      - NGINX_HOST=dlt.aurex.in
      - NGINX_PORT=443

  # PostgreSQL for DLT Data Storage
  dlt-postgres:
    image: postgres:15-alpine
    container_name: dlt-postgres
    environment:
      - POSTGRES_USER=${DLT_DB_USER:-dlt_user}
      - POSTGRES_PASSWORD=${DLT_DB_PASSWORD:-dlt_secure_password}
      - POSTGRES_DB=${DLT_DB_NAME:-aurigraph_dlt}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - dlt-postgres-data:/var/lib/postgresql/data
      - dlt-postgres-backups:/var/backups/postgresql
    networks:
      - dlt-network
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DLT_DB_USER:-dlt_user}"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.hermes.description=DLT PostgreSQL Database"
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"

  # Prometheus for DLT Metrics
  dlt-prometheus:
    image: prom/prometheus:latest
    container_name: dlt-prometheus
    volumes:
      - ./prometheus-dlt.yml:/etc/prometheus/prometheus.yml:ro
      - dlt-prometheus-data:/prometheus
    networks:
      - dlt-network
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    labels:
      - "com.hermes.description=DLT Prometheus Metrics"
    depends_on:
      - dlt-node

  # Grafana for DLT Monitoring Dashboard
  dlt-grafana:
    image: grafana/grafana:latest
    container_name: dlt-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${DLT_GRAFANA_PASSWORD:-aurigraph_admin}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=dlt-postgres
      - GF_DATABASE_USER=${DLT_DB_USER:-dlt_user}
      - GF_DATABASE_PASSWORD=${DLT_DB_PASSWORD:-dlt_secure_password}
      - GF_DATABASE_NAME=${DLT_DB_NAME:-aurigraph_dlt}
    volumes:
      - dlt-grafana-data:/var/lib/grafana
      - dlt-grafana-provisioning:/etc/grafana/provisioning
    networks:
      - dlt-network
    ports:
      - "3001:3000"
    depends_on:
      - dlt-prometheus
      - dlt-postgres
    restart: unless-stopped
    labels:
      - "com.hermes.description=DLT Grafana Monitoring Dashboard"

  # Redis Cache for DLT Operations
  dlt-redis:
    image: redis:7-alpine
    container_name: dlt-redis-cache
    volumes:
      - dlt-redis-data:/data
    networks:
      - dlt-network
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --requirepass ${DLT_REDIS_PASSWORD:-dlt_redis_password}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.hermes.description=DLT Redis Cache"

volumes:
  dlt-node-logs:
    driver: local
  dlt-node-data:
    driver: local
  dlt-postgres-data:
    driver: local
  dlt-postgres-backups:
    driver: local
  dlt-nginx-logs:
    driver: local
  dlt-nginx-cache:
    driver: local
  dlt-prometheus-data:
    driver: local
  dlt-grafana-data:
    driver: local
  dlt-grafana-provisioning:
    driver: local
  dlt-redis-data:
    driver: local

networks:
  dlt-network:
    driver: bridge
    name: dlt-network
    ipam:
      config:
        - subnet: 172.21.0.0/16
