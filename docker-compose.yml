version: '3.8'

services:
  backend:
    image: hms-hermes:latest
    container_name: hms-backend
    restart: always
    ports:
      - "3000:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - hms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: hms-postgres
    restart: always
    environment:
      POSTGRES_DB: hms_trading
      POSTGRES_USER: hms_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hms_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms_user -d hms_trading"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  hms-network:
    driver: bridge
