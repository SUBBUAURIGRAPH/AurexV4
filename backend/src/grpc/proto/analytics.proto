syntax = "proto3";

package hms.analytics;

// Analytics Service for gRPC/Protobuf communication
service AnalyticsService {
    rpc GetPerformanceMetrics(PerformanceRequest) returns (PerformanceResponse);
    rpc GetRiskAnalysis(RiskRequest) returns (RiskResponse);
    rpc GetPortfolioAnalysis(PortfolioRequest) returns (PortfolioResponse);
    rpc StreamMetrics(StreamRequest) returns (stream MetricsUpdate);
}

// Performance Metrics Request/Response
message PerformanceRequest {
    string strategy_id = 1;
    string start_date = 2;
    string end_date = 3;
}

message PerformanceResponse {
    string strategy_id = 1;
    double total_return = 2;
    double annualized_return = 3;
    double sharpe_ratio = 4;
    double sortino_ratio = 5;
    double calmar_ratio = 6;
    double max_drawdown = 7;
    int64 total_trades = 8;
    double win_rate = 9;
    repeated DailyReturn daily_returns = 10;
}

message DailyReturn {
    string date = 1;
    double return_value = 2;
}

// Risk Analysis Request/Response
message RiskRequest {
    string strategy_id = 1;
    string confidence_level = 2;
}

message RiskResponse {
    string strategy_id = 1;
    double var_95 = 2;
    double var_99 = 3;
    double expected_shortfall_95 = 4;
    double expected_shortfall_99 = 5;
    double volatility = 6;
    double beta = 7;
    double alpha = 8;
    repeated StressTestResult stress_tests = 9;
}

message StressTestResult {
    string scenario = 1;
    double impact = 2;
    double probability = 3;
}

// Portfolio Analysis Request/Response
message PortfolioRequest {
    repeated string strategy_ids = 1;
}

message PortfolioResponse {
    double total_value = 1;
    double portfolio_return = 2;
    double portfolio_risk = 3;
    double diversification_ratio = 4;
    repeated AssetAllocation allocations = 5;
}

message AssetAllocation {
    string asset = 1;
    double percentage = 2;
    double value = 3;
}

// Stream Metrics
message StreamRequest {
    string strategy_id = 1;
    int32 update_interval_ms = 2;
}

message MetricsUpdate {
    int64 timestamp = 1;
    string metric_name = 2;
    double value = 3;
    map<string, string> metadata = 4;
}
