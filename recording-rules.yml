# Prometheus Recording Rules for HMS Trading Platform
# Pre-compute frequently used metrics for better dashboard performance

groups:
  - name: hms-recording-rules
    interval: 15s
    rules:
      # HTTP Request Metrics
      - record: http:requests:rate5m
        expr: rate(http_requests_total[5m])

      - record: http:requests:errors:rate5m
        expr: rate(http_requests_total{status=~"5.."}[5m])

      - record: http:requests:success_rate5m
        expr: 1 - (rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]))

      - record: http:latency:p95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))

      - record: http:latency:p99
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))

      - record: http:latency:avg
        expr: rate(http_request_duration_seconds_sum[5m]) / rate(http_request_duration_seconds_count[5m])

      # Container Resource Metrics
      - record: container:cpu:usage_ratio
        expr: rate(container_cpu_usage_seconds_total[5m])

      - record: container:memory:usage_ratio
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes

      - record: container:network:io_bytes
        expr: rate(container_network_transmit_bytes_total[5m]) + rate(container_network_receive_bytes_total[5m])

      - record: container:disk:io_bytes
        expr: rate(container_fs_io_current_bytes[5m])

      # System Resource Metrics
      - record: system:cpu:usage_ratio
        expr: 1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))

      - record: system:memory:usage_ratio
        expr: 1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)

      - record: system:disk:usage_ratio
        expr: 1 - (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes)

      - record: system:network:errors_rate
        expr: rate(node_network_transmit_errs_total[5m]) + rate(node_network_receive_errs_total[5m])

      # Database Metrics
      - record: postgres:queries:rate1m
        expr: rate(pg_queries_total[1m])

      - record: postgres:slow_queries:rate5m
        expr: rate(pg_slow_queries[5m])

      - record: postgres:connections:usage_ratio
        expr: pg_stat_activity_count / pg_settings_max_connections

      - record: postgres:cache:hit_ratio
        expr: rate(pg_stat_database_blks_hit[5m]) / (rate(pg_stat_database_blks_hit[5m]) + rate(pg_stat_database_blks_read[5m]))

      - record: postgres:transaction:duration_avg
        expr: rate(pg_transaction_duration_sum[5m]) / rate(pg_transaction_count[5m])

      # Redis Metrics
      - record: redis:memory:usage_ratio
        expr: redis_memory_used_bytes / redis_memory_max_bytes

      - record: redis:operations:rate1m
        expr: rate(redis_commands_processed_total[1m])

      - record: redis:evictions:rate5m
        expr: rate(redis_evicted_keys_total[5m])

      - record: redis:hit_ratio:5m
        expr: rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))

      - record: redis:connected_clients:ratio
        expr: redis_connected_clients / redis_config_maxclients

      # Nginx Metrics
      - record: nginx:requests:rate1m
        expr: rate(nginx_http_requests_total[1m])

      - record: nginx:requests:errors:rate5m
        expr: rate(nginx_http_requests_total{status=~"5.."}[5m])

      - record: nginx:connections:active_ratio
        expr: nginx_connections_active / nginx_connections_accepted

      - record: nginx:response_time:p95
        expr: histogram_quantile(0.95, rate(nginx_http_request_duration_seconds_bucket[5m]))

      - record: nginx:cache:hit_ratio
        expr: rate(nginx_cache_hits[5m]) / (rate(nginx_cache_hits[5m]) + rate(nginx_cache_misses[5m]))

      # Trading Engine Metrics
      - record: trading:orders:rate1m
        expr: rate(trading_orders_created_total[1m])

      - record: trading:orders:pending_ratio
        expr: trading_orders_pending / trading_orders_total

      - record: trading:execution:success_rate
        expr: rate(trading_executions_successful[5m]) / rate(trading_executions_total[5m])

      - record: trading:latency:p95
        expr: histogram_quantile(0.95, rate(trading_execution_duration_seconds_bucket[5m]))

      - record: trading:pnl:daily
        expr: trading_daily_pnl

      - record: trading:drawdown:current
        expr: (trading_equity_peak - trading_equity_current) / trading_equity_peak

      - record: trading:sharpe:current
        expr: trading_returns_mean / trading_returns_stddev

      # Business Metrics
      - record: business:transactions:total
        expr: increase(transaction_count_total[1d])

      - record: business:revenue:daily
        expr: increase(revenue_total[1d])

      - record: business:user_activity:rate
        expr: rate(user_events_total[5m])

      - record: business:uptime:ratio
        expr: count(up{job=~"hms-.*"}) / count(up)

      # Composite Metrics
      - record: hms:health:score
        expr: |
          (
            (1 - (rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]))) * 0.4
            + (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) > 0.9) * 0.2
            + (1 - (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85) * 0.2
            + (count(up{job=~"hms-.*"} == 1) / count(up{job=~"hms-.*"})) * 0.2
          ) * 100

      - record: hms:slo:availability
        expr: count(up{job=~"hms-.*"} == 1) / count(up{job=~"hms-.*"})

      - record: hms:slo:error_budget_remaining
        expr: (1 - (rate(http_requests_total{status=~"5.."}[1h]) / rate(http_requests_total[1h]))) - 0.99

      - record: hms:slo:latency_budget_remaining
        expr: (2 - histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[1h]))) / 2
