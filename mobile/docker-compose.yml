version: '3.8'

services:
  # HMS Mobile App Web Server
  hms-mobile-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hms-mobile-web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates (comment out for testing without HTTPS)
      # - /etc/letsencrypt/live/aurexcrt1:/etc/letsencrypt/live/aurexcrt1:ro
      # Nginx logs
      - ./logs/nginx:/var/log/nginx
      # Custom nginx config
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - FRONTEND_URL=https://hms.aurex.in
      - API_URL=https://apihms.aurex.in
      - WS_URL=wss://apihms.aurex.in
      - NODE_ENV=production
    networks:
      - hms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "app=hms-mobile"
      - "environment=production"
      - "version=1.0.0"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "app=hms-mobile"

networks:
  hms-network:
    driver: bridge

volumes:
  nginx-logs:
    driver: local
