# Prometheus Alert Rules for HMS Trading Platform
# Critical alerts for production monitoring

groups:
  - name: hms-production-alerts
    interval: 15s
    rules:
      # Container Health Alerts
      - alert: ContainerDown
        expr: up{job="hms-mobile-web"} == 0
        for: 2m
        labels:
          severity: critical
          service: hms-mobile-web
        annotations:
          summary: "HMS Mobile Web container is DOWN"
          description: "The {{ $labels.instance }} container has been unreachable for more than 2 minutes"
          runbook: "https://wiki.hms.local/runbooks/container-down"

      - alert: ContainerCrashLooping
        expr: rate(container_last_seen{name="hms-mobile-web"}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          service: hms-mobile-web
        annotations:
          summary: "HMS Mobile Web container is crash looping"
          description: "Container {{ $labels.instance }} has restarted {{ $value }} times in the last 5 minutes"

      # API Health Alerts
      - alert: APIEndpointDown
        expr: probe_success{job="health-checks"} == 0
        for: 1m
        labels:
          severity: critical
          service: hms-backend-api
        annotations:
          summary: "{{ $labels.instance }} API endpoint is DOWN"
          description: "Health check failing for {{ $labels.instance }} for more than 1 minute"

      - alert: HighAPILatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: hms-backend-api
        annotations:
          summary: "High API latency detected"
          description: "95th percentile API latency is {{ $value }}s (threshold: 2s)"

      - alert: HighAPIErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: hms-backend-api
        annotations:
          summary: "High API error rate"
          description: "{{ $value | humanizePercentage }} of requests are returning 5xx errors"

      # Database Alerts
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL database is DOWN"
          description: "Cannot reach PostgreSQL instance for more than 1 minute"

      - alert: PostgreSQLSlowQueries
        expr: rate(pg_slow_queries[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "{{ $value }} slow queries per second detected"

      - alert: PostgreSQLConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "High PostgreSQL connections"
          description: "{{ $value }} active connections (threshold: 80)"

      # Redis Alerts
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis cache is DOWN"
          description: "Cannot reach Redis instance for more than 1 minute"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory is at {{ $value | humanizePercentage }} (threshold: 85%)"

      - alert: RedisEvictions
        expr: rate(redis_evicted_keys_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis is evicting keys"
          description: "{{ $value }} keys per second are being evicted due to memory pressure"

      # System Resource Alerts
      - alert: HighCPUUsage
        expr: (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 0.85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is at {{ $value | humanizePercentage }} (threshold: 85%)"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is at {{ $value | humanizePercentage }} (threshold: 85%)"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "Low disk space"
          description: "Only {{ $value | humanizePercentage }} disk space available on {{ $labels.device }}"

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes) < 0.05
        for: 2m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "CRITICAL: Disk space almost full"
          description: "Only {{ $value | humanizePercentage }} disk space available on {{ $labels.device }}"

      # SSL Certificate Alerts
      - alert: SSLCertificateExpiringSoon
        expr: (ssl_cert_not_after - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
          service: ssl-monitor
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate for {{ $labels.instance }} expires in {{ $value | humanize }} days"

      - alert: SSLCertificateExpiredCritical
        expr: (ssl_cert_not_after - time()) / 86400 < 7
        for: 1m
        labels:
          severity: critical
          service: ssl-monitor
        annotations:
          summary: "SSL certificate expires in less than 7 days"
          description: "URGENT: SSL certificate for {{ $labels.instance }} expires in {{ $value | humanize }} days"

      # Nginx Alerts
      - alert: NginxDown
        expr: up{job="nginx"} == 0
        for: 1m
        labels:
          severity: critical
          service: nginx
        annotations:
          summary: "Nginx web server is DOWN"
          description: "Nginx instance {{ $labels.instance }} is unreachable"

      - alert: NginxHighErrorRate
        expr: rate(nginx_http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: nginx
        annotations:
          summary: "Nginx high error rate"
          description: "{{ $value | humanizePercentage }} of requests are returning 5xx errors"

      # Trading Platform Specific Alerts
      - alert: TradingEngineDown
        expr: up{job="trading-metrics"} == 0
        for: 2m
        labels:
          severity: critical
          service: trading-engine
        annotations:
          summary: "Trading engine is DOWN"
          description: "Trading engine metrics endpoint is unreachable for more than 2 minutes"

      - alert: OrderProcessingBacklog
        expr: trading_orders_pending > 1000
        for: 10m
        labels:
          severity: warning
          service: trading-engine
        annotations:
          summary: "Order processing backlog detected"
          description: "{{ $value }} orders pending in queue (threshold: 1000)"

      - alert: HighOrderLatency
        expr: trading_order_latency_seconds > 5
        for: 5m
        labels:
          severity: warning
          service: trading-engine
        annotations:
          summary: "High order processing latency"
          description: "Average order latency is {{ $value }}s (threshold: 5s)"

      # Network Connectivity Alerts
      - alert: NetworkPacketLoss
        expr: rate(node_network_transmit_errs_total[5m]) > 0.001
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "Network packet loss detected"
          description: "Network errors at {{ $value }} errors/sec on {{ $labels.device }}"

      - alert: HighNetworkUtilization
        expr: (rate(node_network_transmit_bytes_total[5m]) + rate(node_network_receive_bytes_total[5m])) / 1024 / 1024 > 100
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High network utilization"
          description: "Network traffic is {{ $value | humanize }}MB/s on {{ $labels.device }}"

      # Prometheus Internal Alerts
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: warning
          service: prometheus
        annotations:
          summary: "Prometheus target {{ $labels.job }} is DOWN"
          description: "{{ $labels.instance }} has not been reachable for more than 5 minutes"

      - alert: PrometheusHighMemory
        expr: process_resident_memory_bytes{job="prometheus"} / 1024 / 1024 / 1024 > 4
        for: 10m
        labels:
          severity: warning
          service: prometheus
        annotations:
          summary: "Prometheus high memory usage"
          description: "Prometheus is using {{ $value | humanize }}GB of memory"

      - alert: PrometheusSlowQueries
        expr: rate(prometheus_tsdb_symbol_table_size_bytes[5m]) > 1000000
        for: 5m
        labels:
          severity: warning
          service: prometheus
        annotations:
          summary: "Prometheus slow queries detected"
          description: "Prometheus query performance is degrading"
