global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'HMS Staging'
    environment: 'staging'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # HMS Application
  - job_name: 'hms-app'
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['hms-app:3001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme

  # gRPC Metrics (if exposed)
  - job_name: 'grpc'
    scrape_interval: 10s
    static_configs:
      - targets: ['hms-app:50051']
