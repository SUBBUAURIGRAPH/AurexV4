global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'hermes-trading-platform'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend Application
  - job_name: 'hermes-backend'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:3001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # PostgreSQL Metrics (using postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:9187']

  # Redis Metrics (using redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']
