# NGINX Configuration for HMS Production Deployment
# Frontend: hms.aurex.in
# Backend API: apihms.aurex.in
# SSL: Let's Encrypt (aurexcrt1)

# Upstream application servers
upstream hms_backend {
    server localhost:3000 max_fails=3 fail_timeout=30s;
}

upstream hms_api {
    server localhost:3000 max_fails=3 fail_timeout=30s;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hms.aurex.in apihms.aurex.in;
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Frontend Server (hms.aurex.in)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hms.aurex.in;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/aurexcrt1/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aurexcrt1/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Logging
    access_log /var/log/nginx/hms.aurex.in.access.log;
    error_log /var/log/nginx/hms.aurex.in.error.log;
    
    # Frontend static files and routing
    location / {
        proxy_pass http://hms_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://hms_backend/api/gnn/health;
        access_log off;
    }
}

# Backend API Server (apihms.aurex.in)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apihms.aurex.in;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/aurexcrt1/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aurexcrt1/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # CORS Headers
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    
    # Logging
    access_log /var/log/nginx/apihms.aurex.in.access.log;
    error_log /var/log/nginx/apihms.aurex.in.error.log;
    
    # API Rate Limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req zone=api_limit burst=20 nodelay;
    
    # API routes
    location / {
        proxy_pass http://hms_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeouts (longer for API operations)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # Health check endpoint
    location /api/gnn/health {
        proxy_pass http://hms_api/api/gnn/health;
        access_log off;
    }
}
