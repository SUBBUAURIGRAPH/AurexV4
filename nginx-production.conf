# NGINX Configuration for HMS Production Deployment
# Frontend: hms.aurex.in
# Backend API: apihms.aurex.in
# SSL: Let's Encrypt (aurexcrt1)

# Define rate limiting zones globally
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

# Upstream application server
upstream hms_app {
    server localhost:3000 max_fails=3 fail_timeout=30s keepalive=32;
}

# HTTP/2 Push map for frontend assets
map $sent_http_content_type $push_resources {
    default "";
}

# Gzip compression configuration
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript
           application/json application/javascript application/xml+rss
           application/rss+xml application/atom+xml image/svg+xml
           text/x-component text/x-cross-domain-policy;
gzip_disable "msie6";

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hms.aurex.in apihms.aurex.in _;

    # Let's Encrypt challenge (certbot renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Frontend Server (hms.aurex.in)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hms.aurex.in;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/aurexcrt1/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aurexcrt1/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Logging
    access_log /var/log/nginx/hms.aurex.in.access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/hms.aurex.in.error.log warn;

    # Disable server tokens
    server_tokens off;

    # Frontend requests with rate limiting
    location / {
        limit_req zone=general_limit burst=50 nodelay;

        proxy_pass http://hms_app;
        proxy_http_version 1.1;

        # Connection upgrades (WebSocket support)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Request headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Proxy behavior
        proxy_redirect off;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (pass-through)
    location /api/gnn/health {
        proxy_pass http://hms_app;
        access_log off;
    }
}

# Backend API Server (apihms.aurex.in)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apihms.aurex.in;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/aurexcrt1/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aurexcrt1/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # CORS Headers - Restricted to frontend origin
    add_header Access-Control-Allow-Origin "https://hms.aurex.in" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age "86400" always;

    # Logging
    access_log /var/log/nginx/apihms.aurex.in.access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/apihms.aurex.in.error.log warn;

    # Disable server tokens
    server_tokens off;

    # Handle CORS preflight requests
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        # CORS preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass http://hms_app;
        proxy_http_version 1.1;

        # Connection upgrades (WebSocket support)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Request headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Proxy behavior
        proxy_redirect off;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Timeouts (longer for API operations)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Health check endpoint (no CORS headers needed)
    location /api/gnn/health {
        limit_req zone=general_limit burst=100 nodelay;

        proxy_pass http://hms_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        access_log off;
    }
}
