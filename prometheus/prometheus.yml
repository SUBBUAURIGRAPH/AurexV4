# ====================
# Metric Collection Summary
# ====================
#
# This configuration collects metrics from:
# 1. HMS J4C Agent API (port 9003) - Application metrics
# 2. PostgreSQL Database (port 9187) - Database performance
# 3. Node Exporter (port 9100) - System resources (CPU, memory, disk, network)
# 4. Grafana (port 3000) - Dashboard and visualization metrics
# 5. Prometheus (port 9090) - Self-monitoring
# 6. NGINX Proxy (port 9113) - Reverse proxy metrics
# 7. Blackbox Exporter (port 9115) - Health checks and uptime
# 8. Redis Cache (port 9121) - Cache performance
# 9. Docker/cAdvisor (port 8080) - Container metrics
# 10. WebSocket Server - Real-time connection metrics
# 11. Alpaca Broker Integration - Trading API metrics
#
# Total scrape targets: 11 services
# Total metrics collected: ~5,000-10,000 time series
# Storage requirement: ~2-3 GB per month
# Query load: ~100-500 queries per minute (with Grafana dashboards)
#
# ====================
# Performance Tuning Notes
# ====================
#
# 1. Scrape intervals optimized per service:
#    - Critical services (API, WebSocket): 10s
#    - Standard services (Node, Prometheus): 15s
#    - Database and caches: 30s
#
# 2. Metric relabeling used to:
#    - Drop high-cardinality metrics
#    - Filter service-specific metrics
#    - Add consistent labeling
#
# 3. Remote write configured for long-term storage (Thanos)
# 4. Retention: 30 days local, unlimited remote
# 5. WAL compression enabled for disk savings
#
# ====================
# Security Considerations
# ====================
#
# 1. All internal service communication (no external exposure)
# 2. Authentication required for remote read/write
# 3. TLS encryption for remote storage
# 4. RBAC enforced via Grafana for dashboard access
# 5. Sensitive metrics filtered via relabeling
#
# ====================
