# HMS (Hermes Trading Platform) - Monitoring Stack
# Phase 4: Performance & Monitoring Infrastructure
# Production Server: hms.aurex.in
# Last Updated: October 30, 2025

version: '3.8'

networks:
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

services:
  # ========================================
  # PROMETHEUS - Metrics Collection & Storage
  # ========================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: hms-prometheus
    restart: unless-stopped
    user: "0"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=50GB'
      - '--storage.tsdb.wal-compression'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - ./recording-rules.yml:/etc/prometheus/recording-rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
    depends_on:
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      com.hms.service: "prometheus"
      com.hms.description: "Time-series database and monitoring"

  # ========================================
  # ALERTMANAGER - Alert Routing & Notification
  # ========================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: hms-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://hms.aurex.in/alertmanager'
      - '--cluster.advertise-address=0.0.0.0:9093'
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./templates:/etc/alertmanager/templates:ro
      - alertmanager-data:/alertmanager
    networks:
      - monitoring
    environment:
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      com.hms.service: "alertmanager"
      com.hms.description: "Alert routing and notifications"

  # ========================================
  # GRAFANA - Visualization & Dashboards
  # ========================================
  grafana:
    image: grafana/grafana:10.1.5
    container_name: hms-grafana
    restart: unless-stopped
    user: "0"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://hms.aurex.in/grafana
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=info
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      com.hms.service: "grafana"
      com.hms.description: "Metrics visualization and dashboards"

  # ========================================
  # NODE EXPORTER - System Metrics
  # ========================================
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: hms-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring
    labels:
      com.hms.service: "node-exporter"
      com.hms.description: "System-level metrics exporter"

  # ========================================
  # POSTGRES EXPORTER - Database Metrics
  # ========================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.14.0
    container_name: hms-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    networks:
      - monitoring
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-hms_production}?sslmode=disable
      - PG_EXPORTER_EXTEND_QUERY_PATH=/etc/postgres_exporter/queries.yaml
    volumes:
      - ./postgres_exporter_queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    labels:
      com.hms.service: "postgres-exporter"
      com.hms.description: "PostgreSQL metrics exporter"

  # ========================================
  # BLACKBOX EXPORTER - Endpoint Monitoring
  # ========================================
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.24.0
    container_name: hms-blackbox-exporter
    restart: unless-stopped
    command:
      - '--config.file=/etc/blackbox/blackbox.yml'
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks:
      - monitoring
    labels:
      com.hms.service: "blackbox-exporter"
      com.hms.description: "HTTP/HTTPS/TCP endpoint monitoring"

  # ========================================
  # CADVISOR - Container Metrics
  # ========================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: hms-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
      - '--disable_metrics=disk,diskIO,network,tcp,udp,percpu,sched,process'
    labels:
      com.hms.service: "cadvisor"
      com.hms.description: "Container resource usage monitoring"

  # ========================================
  # NGINX EXPORTER - Web Server Metrics
  # ========================================
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:0.11.0
    container_name: hms-nginx-exporter
    restart: unless-stopped
    command:
      - '-nginx.scrape-uri=http://nginx:80/nginx_status'
    ports:
      - "9113:9113"
    networks:
      - monitoring
    depends_on:
      - nginx
    labels:
      com.hms.service: "nginx-exporter"
      com.hms.description: "NGINX metrics exporter"

  # ========================================
  # REDIS EXPORTER - Cache Metrics (Optional)
  # ========================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: hms-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    networks:
      - monitoring
    labels:
      com.hms.service: "redis-exporter"
      com.hms.description: "Redis cache metrics exporter"

  # ========================================
  # NGINX - Reverse Proxy
  # ========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: hms-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - monitoring
    depends_on:
      - grafana
      - prometheus
      - alertmanager
    labels:
      com.hms.service: "nginx"
      com.hms.description: "Reverse proxy for monitoring services"

  # ========================================
  # AMTOOL - Alertmanager CLI (for maintenance)
  # ========================================
  amtool:
    image: prom/alertmanager:v0.26.0
    container_name: hms-amtool
    entrypoint: ["/bin/sh", "-c", "sleep infinity"]
    networks:
      - monitoring
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    labels:
      com.hms.service: "amtool"
      com.hms.description: "Alertmanager command-line tool"

# ========================================
# USAGE INSTRUCTIONS
# ========================================
#
# 1. Setup environment variables:
#    cp .env.example .env
#    # Edit .env with your credentials
#
# 2. Start all services:
#    docker-compose up -d
#
# 3. Verify services are running:
#    docker-compose ps
#
# 4. Access services:
#    - Prometheus: http://localhost:9090
#    - Grafana: http://localhost:3000 (admin/admin)
#    - Alertmanager: http://localhost:9093
#
# 5. Import Grafana dashboards:
#    - Login to Grafana
#    - Go to Dashboards → Import
#    - Upload JSON files from dashboards/ directory
#
# 6. Test alerting:
#    docker exec hms-amtool amtool alert add \
#      --alertmanager.url=http://alertmanager:9093 \
#      alertname=TestAlert severity=warning
#
# 7. View logs:
#    docker-compose logs -f [service-name]
#
# 8. Stop services:
#    docker-compose down
#
# 9. Backup data:
#    docker run --rm -v prometheus-data:/data \
#      -v $(pwd):/backup alpine tar czf /backup/prometheus-backup.tar.gz /data
#
# ========================================
# PRODUCTION DEPLOYMENT
# ========================================
#
# 1. Use strong passwords in .env
# 2. Enable SSL/TLS for all services
# 3. Configure firewall rules
# 4. Set up automated backups
# 5. Configure log rotation
# 6. Enable authentication on all services
# 7. Use secrets management (Docker Secrets or Vault)
# 8. Set resource limits appropriately
# 9. Monitor monitoring stack itself
# 10. Document runbooks and procedures
#
# ========================================
# RESOURCE REQUIREMENTS
# ========================================
#
# Minimum:
# - CPU: 4 cores
# - RAM: 8 GB
# - Disk: 100 GB SSD
#
# Recommended:
# - CPU: 8 cores
# - RAM: 16 GB
# - Disk: 200 GB SSD
#
# ========================================
