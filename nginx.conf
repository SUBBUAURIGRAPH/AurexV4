# NGINX Reverse Proxy Configuration for HMS Trading Platform
# Handles HTTPS/TLS termination and HTTP/2 proxy to backend services
# Domains: hms.aurex.in (frontend), apihms.aurex.in (backend API)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml
               text/x-component text/x-cross-domain-policy;

    # Upstream definitions
    upstream backend_http2 {
        least_conn;
        server hms-backend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream grpc_backend {
        least_conn;
        server hms-backend:50051 max_fails=3 fail_timeout=30s;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

    # ============================================
    # HTTPS Redirect (HTTP -> HTTPS)
    # ============================================
    server {
        listen 80;
        listen [::]:80;
        server_name hms.aurex.in apihms.aurex.in;

        # ACME challenge for Let's Encrypt renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # ============================================
    # Frontend Server (HTTPS/HTTP2)
    # ============================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name hms.aurex.in;

        # SSL/TLS Configuration
        ssl_certificate /etc/letsencrypt/live/aurexcrt1/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aurexcrt1/privkey.pem;

        # TLS 1.3 and 1.2 only
        ssl_protocols TLSv1.3 TLSv1.2;
        ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # HSTS (HTTP Strict Transport Security)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval';" always;

        # HTTP/2 Server Push hints
        add_header Link "</css/style.css>; rel=preload; as=style" always;
        add_header Link "</js/app.js>; rel=preload; as=script" always;

        # Frontend static files
        root /app/web/dist;
        index index.html;

        # Rate limiting
        limit_req zone=general burst=20 nodelay;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # SPA routing - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # Static assets with long cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Disable access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ============================================
    # Backend API Server (HTTPS/HTTP2)
    # ============================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name apihms.aurex.in;

        # SSL/TLS Configuration
        ssl_certificate /etc/letsencrypt/live/aurexcrt1/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aurexcrt1/privkey.pem;

        # TLS 1.3 and 1.2 only
        ssl_protocols TLSv1.3 TLSv1.2;
        ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self';" always;

        # Rate limiting for API
        limit_req zone=api burst=100 nodelay;

        # Health check endpoint
        location /health {
            proxy_pass http://backend_http2;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # API endpoints (REST)
        location /api/ {
            proxy_pass http://backend_http2;

            # HTTP/2 optimization
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # gRPC endpoint (HTTP/2)
        location /hms.analytics.AnalyticsService/ {
            proxy_pass http://grpc_backend;

            # gRPC requires HTTP/2
            proxy_http_version 2.0;
            proxy_set_header Connection "";

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # gRPC specific
            proxy_set_header Content-Type application/grpc;
            proxy_read_timeout 86400;
            proxy_set_header grpc-timeout 0;
        }

        # Deny access to sensitive paths
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
