  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: gnn-strategy-learner
    version: "1.0.0"
  annotations:
    description: "GNN Strategy Learner - Continuous Learning Engine (Headless)"
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: gnn-hms-trading-system
    component: gnn-strategy-learner
  ports:
  - name: http
    port: 8006
    targetPort: 8006
    protocol: TCP
  - name: metrics
