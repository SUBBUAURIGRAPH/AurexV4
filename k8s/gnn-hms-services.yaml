  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: gnn-market-recognizer
    version: "1.0.0"
  annotations:
    description: "GNN Market Recognizer - Real-time Pattern Detection"
spec:
  type: ClusterIP
  selector:
    app: gnn-hms-trading-system
    component: gnn-market-recognizer
  ports:
  - name: http
    port: 8003
    targetPort: 8003
    protocol: TCP
  - name: metrics
    port: 9092
    targetPort: 9092
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
