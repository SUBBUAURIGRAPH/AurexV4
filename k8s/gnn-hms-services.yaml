    version: "1.0.0"
  annotations:
    description: "GNN-HMS Logging Aggregator"
spec:
  type: ClusterIP
  selector:
    app: gnn-hms-trading-system
  ports:
  - name: logs
    port: 5000
    targetPort: 5000
    protocol: TCP

---
# ============================================================================
# INTERNAL CACHE SERVICE (Redis-like - for distributed caching)
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gnn-hms-cache
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: cache
    version: "1.0.0"
  annotations:
    description: "GNN-HMS Distributed Cache Service"
spec:
  type: ClusterIP
  clusterIP: None  # Headless for internal use
  selector:
    app: gnn-hms-trading-system
  ports:
  - name: cache
    port: 6379
    targetPort: 6379
    protocol: TCP

---
# ============================================================================
# MONITORING DASHBOARD SERVICE
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gnn-hms-dashboard
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: dashboard
    version: "1.0.0"
  annotations:
    description: "GNN-HMS Monitoring Dashboard"
spec:
  type: ClusterIP
  selector:
    app: gnn-hms-trading-system
  ports:
  - name: dashboard
    port: 3000
    targetPort: 3000
    protocol: TCP

---
# ============================================================================
# ALERTING SERVICE
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gnn-hms-alerts
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: alerts
    version: "1.0.0"
  annotations:
    description: "GNN-HMS Alert Management Service"
spec:
  type: ClusterIP
  selector:
    app: gnn-hms-trading-system
    component: gnn-risk-detector
  ports:
  - name: alerts
    port: 8888
    targetPort: 8005
    protocol: TCP
