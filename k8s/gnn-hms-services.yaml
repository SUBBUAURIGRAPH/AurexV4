---
# ============================================================================
# MAIN API GATEWAY SERVICE (LoadBalancer - Entry Point)
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gnn-hms-api-gateway
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: api-gateway
    version: "1.0.0"
  annotations:
    description: "GNN-HMS API Gateway - Main Entry Point"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: gnn-hms-trading-system
    component: gnn-hms-integration
  ports:
  - name: http
    port: 80
    targetPort: 8002
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8002
    protocol: TCP
  sessionAffinity: ClientIP
  externalTrafficPolicy: Local

---
# ============================================================================
# METRICS AGGREGATOR SERVICE
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gnn-hms-metrics
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: metrics-aggregator
    version: "1.0.0"
  annotations:
    description: "GNN-HMS Metrics Aggregator"
spec:
  type: ClusterIP
  selector:
    app: gnn-hms-trading-system
  ports:
  - name: prometheus
    port: 9090
    targetPort: 9090
    protocol: TCP
  sessionAffinity: None

---
# ============================================================================
# LOGGING AGGREGATOR SERVICE
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gnn-hms-logging
  namespace: gnn-hms
