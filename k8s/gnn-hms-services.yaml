---
# ============================================================================
# 5. GNN RISK DETECTOR SERVICE
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gnn-risk-detector
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
