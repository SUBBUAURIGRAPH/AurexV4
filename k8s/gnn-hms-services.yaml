---
# GNN-HMS Trading System - Kubernetes Services
# Version: 1.0.0
# Purpose: Service definitions for all 7 GNN components and system endpoints

# ============================================================================
# 1. GNN TRADING MANAGER SERVICE
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gnn-trading-manager
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: gnn-trading-manager
    version: "1.0.0"
  annotations:
    description: "GNN Trading Manager - Foundation & Graph Management"
spec:
  type: ClusterIP
  selector:
    app: gnn-hms-trading-system
    component: gnn-trading-manager
  ports:
  - name: http
    port: 8001
    targetPort: 8001
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
# ============================================================================
# 2. GNN HMS INTEGRATION SERVICE
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gnn-hms-integration
  namespace: gnn-hms
