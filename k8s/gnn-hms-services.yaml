    app: gnn-hms-trading-system
    component: gnn-hms-integration
    version: "1.0.0"
  annotations:
    description: "GNN HMS Integration - Unified Orchestration Layer"
spec:
  type: ClusterIP
  selector:
    app: gnn-hms-trading-system
    component: gnn-hms-integration
  ports:
  - name: http
    port: 8002
    targetPort: 8002
    protocol: TCP
  - name: metrics
    port: 9091
    targetPort: 9091
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
