apiVersion: v1
kind: Service
metadata:
  name: hermes-api
  namespace: hermes
  labels:
    app: hermes-api
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 3001
    protocol: TCP
  - name: grpc
    port: 3002
    targetPort: 3002
    protocol: TCP
  selector:
    app: hermes-api
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: v1
kind: Service
metadata:
  name: hermes-api-internal
  namespace: hermes
  labels:
    app: hermes-api
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3001
    targetPort: 3001
  - name: grpc
    port: 3002
    targetPort: 3002
  selector:
    app: hermes-api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hermes-api-hpa
  namespace: hermes
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hermes-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hermes-api-pdb
  namespace: hermes
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: hermes-api
