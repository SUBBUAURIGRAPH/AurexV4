---
# GNN-HMS Trading System - Component Deployments
# Version: 1.0.0
# Kubernetes 1.24+ Compatible
# Purpose: Deployment configurations for all 7 GNN components

# ============================================================================
# 1. GNN TRADING MANAGER - Foundation & Graph Management
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gnn-trading-manager
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: gnn-trading-manager
    version: "1.0.0"
    tier: core
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gnn-hms-trading-system
      component: gnn-trading-manager
  template:
    metadata:
      labels:
        app: gnn-hms-trading-system
        component: gnn-trading-manager
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: gnn-hms-sa
      priorityClassName: gnn-hms-critical
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - gnn-trading-manager
              topologyKey: kubernetes.io/hostname
      containers:
      - name: gnn-trading-manager
        image: aurigraph/gnn-hms:1.0.0-trading-manager
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8001
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: COMPONENT_NAME
          value: "gnn-trading-manager"
        - name: SERVICE_PORT
          value: "8001"
        - name: METRICS_PORT
          value: "9090"
        - name: LOG_LEVEL
          value: "info"
        envFrom:
        - configMapRef:
            name: gnn-hms-config
        - secretRef:
            name: gnn-hms-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8001
            scheme: HTTP
          failureThreshold: 30
          periodSeconds: 10
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: cache-volume
          mountPath: /app/cache
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: config-volume
        configMap:
          name: gnn-trading-manager-config
      - name: cache-volume
        emptyDir:
          sizeLimit: 1Gi
      - name: logs-volume
        emptyDir:
          sizeLimit: 2Gi

---
