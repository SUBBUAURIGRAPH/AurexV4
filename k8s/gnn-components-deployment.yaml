        envFrom:
        - configMapRef:
            name: gnn-hms-config
        - secretRef:
            name: gnn-hms-secrets
        resources:
          requests:
            cpu: "1000m"
            memory: "1Gi"
          limits:
            cpu: "2500m"
            memory: "2.5Gi"
        livenessProbe:
          httpGet:
            path: /health/live
