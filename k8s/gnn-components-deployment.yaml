# ============================================================================
# 6. GNN STRATEGY LEARNER - Continuous Learning Engine
# ============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gnn-strategy-learner
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: gnn-strategy-learner
    version: "1.0.0"
    tier: learning
spec:
  serviceName: gnn-strategy-learner
  replicas: 2
  selector:
    matchLabels:
      app: gnn-hms-trading-system
      component: gnn-strategy-learner
  template:
    metadata:
      labels:
        app: gnn-hms-trading-system
        component: gnn-strategy-learner
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9095"
    spec:
      serviceAccountName: gnn-hms-sa
      priorityClassName: gnn-hms-critical
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - gnn-strategy-learner
              topologyKey: kubernetes.io/hostname
      containers:
      - name: gnn-strategy-learner
        image: aurigraph/gnn-hms:1.0.0-strategy-learner
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8006
          protocol: TCP
        - name: metrics
          containerPort: 9095
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: COMPONENT_NAME
          value: "gnn-strategy-learner"
        - name: SERVICE_PORT
          value: "8006"
        - name: METRICS_PORT
          value: "9095"
        - name: LEARNING_RATE
          value: "0.001"
        - name: BATCH_SIZE
          value: "32"
        envFrom:
        - configMapRef:
            name: gnn-hms-config
        - secretRef:
            name: gnn-hms-secrets
        resources:
          requests:
            cpu: "2000m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8006
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8006
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: learning-data
          mountPath: /app/learning
        - name: model-storage
          mountPath: /app/models
  volumeClaimTemplates:
  - metadata:
      name: learning-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 10Gi
  - metadata:
      name: model-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 10Gi

