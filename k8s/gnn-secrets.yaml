type: Opaque
stringData:
  # Integration-specific secrets
  COMPONENT_AUTH_TOKEN: "your-component-auth-token"
  INTER_SERVICE_SECRET: "shared-secret-for-component-communication"

---
# ============================================================================
# GNN MARKET RECOGNIZER SECRETS
# ============================================================================
