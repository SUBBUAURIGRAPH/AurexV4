metadata:
  name: gnn-risk-detector-secrets
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: gnn-risk-detector
type: Opaque
stringData:
  # Risk management secrets
  RISK_MODEL_KEY: "your-risk-model-key"
