---
# GNN-HMS Trading System - Secrets
# Version: 1.0.0
# IMPORTANT: This is a TEMPLATE file for documentation purposes
# DO NOT commit sensitive values to version control
# Create actual secrets using kubectl create secret or sealed-secrets

# ============================================================================
# AUTHENTICATION & API CREDENTIALS TEMPLATE
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gnn-hms-secrets
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: secrets
    version: "1.0.0"
  annotations:
    description: "Main GNN-HMS secrets - API keys, tokens, and credentials"
    critical: "true"
    encrypted: "true"
type: Opaque
stringData:
  # Exchange API Credentials
  EXCHANGE_API_KEY: "your-exchange-api-key-here"
  EXCHANGE_API_SECRET: "your-exchange-api-secret-here"
  EXCHANGE_API_PASSPHRASE: "your-exchange-api-passphrase-here"

  # Database Credentials
  DATABASE_USERNAME: "gnn-hms-user"
  DATABASE_PASSWORD: "your-secure-database-password-here"
  DATABASE_AUTH_SOURCE: "admin"

  # Message Queue Credentials
  KAFKA_USERNAME: "gnn-hms-client"
  KAFKA_PASSWORD: "your-kafka-password-here"
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"

  # Cache/Redis Credentials
  REDIS_PASSWORD: "your-redis-password-here"
  REDIS_AUTH_TOKEN: "your-redis-auth-token-here"

  # Monitoring & Alerting
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  PAGERDUTY_INTEGRATION_KEY: "your-pagerduty-integration-key-here"
  DATADOG_API_KEY: "your-datadog-api-key-here"
  DATADOG_APP_KEY: "your-datadog-app-key-here"

  # Logging
  ELASTICSEARCH_USERNAME: "elastic"
  ELASTICSEARCH_PASSWORD: "your-elasticsearch-password-here"

  # JWT and Security
  JWT_SECRET: "your-jwt-secret-key-here"
  JWT_EXPIRY: "24h"
  ENCRYPTION_KEY: "your-encryption-key-here"

  # AWS/Cloud Credentials
  AWS_ACCESS_KEY_ID: "your-aws-access-key-id"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-access-key"
  AWS_REGION: "us-east-1"
  AWS_KMS_KEY_ID: "your-kms-key-id-for-encryption"

  # Third-party Services
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "your-email@gmail.com"
  SMTP_PASSWORD: "your-app-specific-password"

  # API Rate Limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "10000"

  # Feature Flags
  FEATURE_FLAGS_JSON: '{"advanced_optimization": true, "ml_learning": true, "multi_asset": true}'

---
# ============================================================================
# DATABASE CREDENTIALS SECRET
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gnn-database-credentials
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: database
type: Opaque
stringData:
  username: "gnn-hms-user"
  password: "your-secure-database-password-here"
  connection-string: "mongodb://gnn-hms-user:password@gnn-hms-mongodb:27017/gnn-hms?authSource=admin&replicaSet=gnn-hms-rs"

---
# ============================================================================
# TLS/SSL CERTIFICATES SECRET
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gnn-hms-tls
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: tls
type: kubernetes.io/tls
data:
  # These should be base64 encoded certificate and key files
  # Generate with: kubectl create secret tls gnn-hms-tls --cert=path/to/cert.pem --key=path/to/key.pem
  tls.crt: "base64-encoded-certificate-here"
  tls.key: "base64-encoded-private-key-here"

---
# ============================================================================
# DOCKER REGISTRY CREDENTIALS SECRET
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gnn-docker-registry
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: registry
type: kubernetes.io/dockercfg
data:
  # Generated with: kubectl create secret docker-registry
  .dockercfg: "base64-encoded-docker-config-here"

---
# ============================================================================
# GNN TRADING MANAGER SECRETS
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gnn-trading-manager-secrets
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: gnn-trading-manager
type: Opaque
stringData:
  # Component-specific secrets
  TRADING_API_KEY: "your-trading-api-key"
  TRADING_API_SECRET: "your-trading-api-secret"
  ENCRYPTION_KEY: "trading-manager-encryption-key"

---
# ============================================================================
# GNN HMS INTEGRATION SECRETS
# ============================================================================
apiVersion: v1
