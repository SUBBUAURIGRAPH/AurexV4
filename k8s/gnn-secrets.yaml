# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gnn-production-deployment-secrets
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: gnn-production-deployment
type: Opaque
stringData:
  # Deployment secrets
  DEPLOYMENT_AUTH_KEY: "deployment-authorization-key"
  ROLLBACK_VERIFICATION_KEY: "rollback-verification-key"
  MONITORING_SERVICE_TOKEN: "monitoring-service-api-token"

---
# ============================================================================
# SSH KEYS SECRET (for Git and remote access)
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gnn-ssh-keys
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: ssh
type: Opaque
data:
  # SSH private key (base64 encoded)
  id_rsa: "base64-encoded-ssh-private-key-here"
  id_rsa.pub: "base64-encoded-ssh-public-key-here"
  known_hosts: "base64-encoded-known-hosts-here"

---
# ============================================================================
# BACKUP ENCRYPTION KEYS
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gnn-backup-keys
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: backup
type: Opaque
stringData:
  # Backup encryption
  BACKUP_ENCRYPTION_KEY: "backup-encryption-key"
  BACKUP_RESTORE_KEY: "backup-restore-key"
  BACKUP_VERIFICATION_KEY: "backup-verification-key"

---
# ============================================================================
# SECRETS ROTATION POLICY ANNOTATION
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: gnn-secrets-rotation-policy
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: secrets-management
data:
  rotation_interval: "30days"
  auto_rotation_enabled: "true"
  rotation_strategy: "rolling"

  rotation_schedule: |
    # Rotation Schedule
    - Secret: gnn-hms-secrets
      Interval: 30 days
      Components: All critical components

    - Secret: gnn-database-credentials
      Interval: 30 days
      Components: Database access

    - Secret: gnn-hms-tls
      Interval: 365 days or on warning
      Components: TLS/SSL

    - Secret: Exchange API Credentials
      Interval: 90 days
      Components: Trading Manager, HMS Integration

---
# ============================================================================
# INSTRUCTIONS FOR CREATING SECRETS
# ============================================================================
#
# IMPORTANT: Do not commit actual secrets to git!
# Use the following methods to create secrets:
#
# Method 1: kubectl create secret
# kubectl create secret generic gnn-hms-secrets \
#   --from-literal=EXCHANGE_API_KEY=your-key \
#   --from-literal=EXCHANGE_API_SECRET=your-secret \
#   -n gnn-hms
#
# Method 2: From files
# kubectl create secret generic gnn-hms-secrets \
#   --from-file=./secrets/ \
#   -n gnn-hms
#
# Method 3: Using Sealed Secrets (recommended for GitOps)
# Install: kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.18.0/controller.yaml
# Seal: echo -n 'secret-value' | kubectl create secret generic temp --dry-run=client --from-file=/dev/stdin -o yaml | kubeseal -f - > sealed-secret.yaml
#
# Method 4: Using External Secrets Operator (for AWS Secrets Manager)
# Install: helm repo add external-secrets https://charts.external-secrets.io
# Create ExternalSecret resource pointing to AWS Secrets Manager
#
# Method 5: Using HashiCorp Vault
# Install Vault and configure K8s auth
# Deploy Vault Injector for pod injection
#
# Verification:
# kubectl get secrets -n gnn-hms
# kubectl describe secret gnn-hms-secrets -n gnn-hms
# kubectl get secret gnn-hms-secrets -o jsonpath='{.data.EXCHANGE_API_KEY}' | base64 -d
#
