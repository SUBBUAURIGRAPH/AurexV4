---
# GNN-HMS Trading System - Network Security Policies
# Version: 1.0.0
# Purpose: Fine-grained network access control between components

# ============================================================================
# DEFAULT DENY INGRESS POLICY
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gnn-hms-default-deny-ingress
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: network-policy
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  # No ingress rules - deny all by default

---
# ============================================================================
# DEFAULT DENY EGRESS POLICY (except DNS and critical services)
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gnn-hms-default-deny-egress
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: network-policy
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53

---
# ============================================================================
# GNN TRADING MANAGER NETWORK POLICY
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gnn-trading-manager-netpol
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: gnn-trading-manager
spec:
  podSelector:
    matchLabels:
      component: gnn-trading-manager
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from HMS Integration
  - from:
    - podSelector:
        matchLabels:
          component: gnn-hms-integration
    ports:
    - protocol: TCP
      port: 8001
  # Allow from Production Deployment (monitoring)
  - from:
    - podSelector:
        matchLabels:
          component: gnn-production-deployment
    ports:
    - protocol: TCP
      port: 9090
  egress:
  # Allow to other GNN components
  - to:
    - podSelector:
        matchLabels:
          app: gnn-hms-trading-system
    ports:
    - protocol: TCP
      port: 8001
    - protocol: TCP
      port: 8002
    - protocol: TCP
      port: 8003
    - protocol: TCP
      port: 8004
    - protocol: TCP
      port: 8005
    - protocol: TCP
      port: 8006
    - protocol: TCP
      port: 8007
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53

---
# ============================================================================
# GNN HMS INTEGRATION NETWORK POLICY
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gnn-hms-integration-netpol
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: gnn-hms-integration
spec:
  podSelector:
    matchLabels:
      component: gnn-hms-integration
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from Ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8002
  # Allow from other GNN components
  - from:
    - podSelector:
        matchLabels:
          app: gnn-hms-trading-system
    ports:
    - protocol: TCP
      port: 8002
  egress:
  # Allow to all GNN components
  - to:
    - podSelector:
        matchLabels:
          app: gnn-hms-trading-system
    ports:
    - protocol: TCP
      port: 8001
    - protocol: TCP
      port: 8002
    - protocol: TCP
      port: 8003
    - protocol: TCP
      port: 8004
    - protocol: TCP
      port: 8005
    - protocol: TCP
      port: 8006
    - protocol: TCP
      port: 8007
  # Allow to MongoDB
  - to:
    - podSelector:
        matchLabels:
          app: mongodb
    ports:
    - protocol: TCP
      port: 27017
  # Allow to Kafka
  - to:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53

---
