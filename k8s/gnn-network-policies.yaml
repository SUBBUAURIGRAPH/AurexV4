# ============================================================================
# NETWORK POLICY DOCUMENTATION
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: gnn-network-policy-doc
  namespace: gnn-hms
  labels:
    app: gnn-hms-trading-system
    component: documentation
data:
  network-security-guide.md: |
    # GNN-HMS Network Security Policies

    ## Overview
    - Default deny ingress and egress for all pods
    - Explicit allow rules for required communications
    - Component-to-component communication within namespace
    - External access only through LoadBalancer/Ingress

    ## Traffic Flow Rules

    ### Inbound Traffic
    1. **Ingress Controller** → **HMS Integration** (port 8002)
    2. **GNN Components** → **Any GNN Component** (internal communication)
    3. **Prometheus** → **All Components** (metrics on ports 9090-9096)

    ### Outbound Traffic
    1. **All Components** → **Kubernetes DNS** (UDP 53)
    2. **Integration** → **All Other Components** (orchestration)
    3. **Market Recognizer** → **Kafka** (market data)
    4. **Risk Detector** → **Kafka** (alerts)
    5. **Strategy Learner** → **Kafka** (training data)
    6. **All Components** → **MongoDB** (data persistence)
    7. **Risk Detector** → **Alertmanager** (alert escalation)
    8. **Production Deployment** → **Kubernetes API** (deployment management)

    ## Component Communication Matrix

    | From | To | Port | Protocol | Purpose |
    |------|----|----|----------|---------|
    | Integration | Trading Manager | 8001 | TCP | Orchestration |
    | Integration | Market Recognizer | 8003 | TCP | Pattern queries |
    | Integration | Portfolio Optimizer | 8004 | TCP | Allocation requests |
    | Integration | Risk Detector | 8005 | TCP | Risk monitoring |
    | Integration | Strategy Learner | 8006 | TCP | Model queries |
    | Market Recognizer | Risk Detector | 8005 | TCP | Signal alerts |
    | Market Recognizer | Strategy Learner | 8006 | TCP | Training data |
    | All | Kafka | 9092 | TCP | Event streaming |
    | All | MongoDB | 27017 | TCP | Data persistence |

    ## Security Best Practices Implemented
    1. Default deny policies
    2. Least privilege access
    3. Namespace isolation
    4. Role-based access control (RBAC)
    5. Service account limitations
    6. Network segmentation
    7. Metrics authentication
    8. Audit logging enabled

    ## Monitoring Network Policies
    ```bash
    # List all network policies
    kubectl get networkpolicies -n gnn-hms

    # Describe a policy
    kubectl describe networkpolicy <name> -n gnn-hms

    # Test connectivity (from pod)
    kubectl exec -it <pod> -n gnn-hms -- /bin/sh
    # Inside pod: curl http://<service>:<port>

    # Check denied connections in logs
    kubectl logs -n gnn-hms -l app=gnn-hms-trading-system --grep="denied"
    ```
