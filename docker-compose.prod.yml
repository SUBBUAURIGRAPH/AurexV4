version: '3.8'

# Production Docker Compose for Aurigraph v2.1.0
# Includes: Application, PostgreSQL, Redis, Prometheus, Grafana
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # Main Application Service
  aurigraph:
    image: ${REGISTRY_URL}/aurigraph:v2.1.0-prod
    container_name: aurigraph-app
    environment:
      NODE_ENV: production
      LOG_LEVEL: info

      # Database
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: 'true'
      DB_MAX_CONNECTIONS: 50

      # Redis
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0

      # Exchange Connector
      EXCHANGE_API_KEY_ENCRYPTION_PASSWORD: ${EXCHANGE_ENCRYPTION_PASSWORD}
      EXCHANGE_CONNECTION_POOL_SIZE: 50
      EXCHANGE_RATE_LIMIT_ENABLED: 'true'

      # Strategy Builder
      STRATEGY_ENGINE_MAX_CONCURRENT: 100
      STRATEGY_OPTIMIZATION_MAX_ITERATIONS: 500

      # API
      API_PORT: 8080
      API_HOST: 0.0.0.0
      API_RATE_LIMIT: 1000
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}

      # Monitoring
      PROMETHEUS_ENABLED: 'true'
      PROMETHEUS_PORT: 9090

    ports:
      - "8080:8080"   # HTTP API
      - "8081:8081"   # gRPC
      - "9090:9090"   # Prometheus metrics

    volumes:
      - /var/log/aurigraph:/app/logs
      - /var/lib/aurigraph/data:/app/data

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped

    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

    networks:
      - aurigraph-net

  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: aurigraph-db
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=100"

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/create-indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    networks:
      - aurigraph-net

  # PostgreSQL Read Replica (optional, for HA)
  postgres-replica:
    image: postgres:14-alpine
    container_name: aurigraph-db-replica
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGUSER: ${DB_USER}

    ports:
      - "5433:5432"

    command: |
      bash -c "
      until pg_basebackup -h postgres -D /var/lib/postgresql/data -U ${DB_USER} -v -P -W
      do
      echo 'Waiting for primary...'
      sleep 1s
      done
      && touch /recovery.conf
      && /usr/local/bin/docker-entrypoint.sh postgres
      "

    depends_on:
      - postgres

    restart: unless-stopped

    networks:
      - aurigraph-net

    profiles: ["ha"]

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aurigraph-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 8gb --maxmemory-policy allkeys-lru

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 4G

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    networks:
      - aurigraph-net

  # Redis Sentinel (optional, for HA)
  redis-sentinel:
    image: redis:7-alpine
    container_name: aurigraph-redis-sentinel
    command: redis-sentinel /etc/sentinel.conf

    ports:
      - "26379:26379"

    volumes:
      - ./config/sentinel.conf:/etc/sentinel.conf
      - sentinel_data:/data

    depends_on:
      - redis

    restart: unless-stopped

    networks:
      - aurigraph-net

    profiles: ["ha"]

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: aurigraph-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

    depends_on:
      - aurigraph

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

    networks:
      - aurigraph-net

  # AlertManager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: aurigraph-alertmanager

    ports:
      - "9093:9093"

    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

    networks:
      - aurigraph-net

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: aurigraph-grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}

    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro

    depends_on:
      - prometheus

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

    networks:
      - aurigraph-net

  # Node Exporter (System Metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: aurigraph-node-exporter

    ports:
      - "9100:9100"

    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

    restart: unless-stopped

    networks:
      - aurigraph-net

  # cAdvisor (Container Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: aurigraph-cadvisor

    ports:
      - "8081:8080"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

    restart: unless-stopped

    networks:
      - aurigraph-net

  # Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    container_name: aurigraph-nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx

    depends_on:
      - aurigraph

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

    networks:
      - aurigraph-net

# Networks
networks:
  aurigraph-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local
  nginx_cache:
    driver: local
  sentinel_data:
    driver: local
