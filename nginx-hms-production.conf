# NGINX Reverse Proxy Configuration for HMS Trading Platform v2.2.0
# Comprehensive configuration with HTTPS/TLS termination, CORS, and security hardening
# Domains: hms.aurex.in (frontend), apihms.aurex.in (backend API)
# Date: November 3, 2025

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Load dynamic modules
include /usr/share/nginx/modules-enabled/*.conf;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============================================
    # Logging Configuration
    # ============================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json_combined escape=json
    '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"scheme":"$scheme",'
        '"request_method":"$request_method",'
        '"server_protocol":"$server_protocol",'
        '"http_host":"$http_host",'
        '"request_uri":"$request_uri"'
    '}';

    access_log /var/log/nginx/access.log main;
    access_log /var/log/nginx/access.json.log json_combined;

    # ============================================
    # Performance Optimization
    # ============================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 5M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml
               application/x-font-ttf application/x-font-opentype
               application/vnd.ms-fontobject;

    # ============================================
    # Rate Limiting Zones
    # ============================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=metrics_limit:10m rate=5r/s;

    # Upstream backend server for HMS Application
    upstream hms_backend {
        least_conn;
        server hms-app:3001 max_fails=3 fail_timeout=30s weight=1;
        keepalive 32;
    }

    # Upstream gRPC backend server
    upstream hms_grpc_backend {
        least_conn;
        server hms-app:50051 max_fails=3 fail_timeout=30s weight=1;
    }

    # Upstream Prometheus metrics server
    upstream prometheus_backend {
        server prometheus:9090;
        keepalive 32;
    }

    # Upstream Grafana visualization server
    upstream grafana_backend {
        server grafana:3000;
        keepalive 32;
    }

    # ============================================
    # Map CORS origins based on environment
    # ============================================
    map $http_origin $cors_origin {
        default "";
        "~^https?://localhost(:[0-9]+)?$" $http_origin;
        "~^https?://127.0.0.1(:[0-9]+)?$" $http_origin;
        "~^https://hms\.aurex\.in$" $http_origin;
        "~^https://apihms\.aurex\.in$" $http_origin;
        "~^https://[a-z0-9.-]*\.aurex\.in$" $http_origin;
    }

    # ============================================
    # HTTP to HTTPS Redirect Server
    # ============================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name hms.aurex.in apihms.aurex.in *.hms.aurex.in *.apihms.aurex.in;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # ============================================
    # Frontend Server (HTTPS/HTTP2)
    # Serves SPA and proxies API requests
    # ============================================
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name hms.aurex.in www.hms.aurex.in;

        # ============================================
        # SSL/TLS Configuration
        # ============================================
        ssl_certificate /etc/letsencrypt/live/aurexcrt1/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aurexcrt1/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/aurexcrt1/chain.pem;

        # TLS 1.3 and 1.2 only (1.1 and older disabled for security)
        ssl_protocols TLSv1.3 TLSv1.2;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:!aNULL:!MD5:!DSS';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP Stapling for faster TLS handshake
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_stapling_responder http://ocsp.int-x3.letsencrypt.org;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # ============================================
        # Security Headers
        # ============================================
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https: wss:; font-src 'self' data: https:; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; frame-ancestors 'self';" always;

        # ============================================
        # CORS Headers (Whitelist Pattern)
        # ============================================
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Correlation-ID, Accept, Origin" always;
        add_header Access-Control-Expose-Headers "X-Correlation-ID, X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset" always;
        add_header Access-Control-Max-Age "86400" always;

        # ============================================
        # Logging
        # ============================================
        access_log /var/log/nginx/hms-frontend-access.log main;
        access_log /var/log/nginx/hms-frontend-access.json.log json_combined;
        error_log /var/log/nginx/hms-frontend-error.log warn;

        # ============================================
        # Locations
        # ============================================

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "HMS Frontend - OK\n";
            add_header Content-Type text/plain;
        }

        # CORS preflight requests
        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, X-Correlation-ID, Accept, Origin' always;
                add_header 'Access-Control-Max-Age' '86400' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' '0' always;
                return 204;
            }

            limit_req zone=general_limit burst=50 nodelay;

            proxy_pass http://hms_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;

            # Connection management
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Static assets with long cache and no CORS needed
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
            limit_req zone=general_limit burst=100 nodelay;
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # API endpoints with rate limiting
        location /api/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, X-Correlation-ID, Accept, Origin' always;
                add_header 'Access-Control-Max-Age' '86400' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' '0' always;
                return 204;
            }

            limit_req zone=api_limit burst=100 nodelay;

            proxy_pass http://hms_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;

            # Connection management
            proxy_set_header Connection "";
            proxy_buffering off;

            # Timeouts for API
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Metrics endpoint (rate limited and protected)
        location /metrics {
            limit_req zone=metrics_limit burst=10 nodelay;

            proxy_pass http://hms_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Connection management
            proxy_set_header Connection "";
            proxy_buffering off;

            access_log /var/log/nginx/metrics-access.log;
            error_log /var/log/nginx/metrics-error.log warn;
        }

        # Deny access to hidden files and backup files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ /.git {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ============================================
    # Backend API Server (HTTPS/HTTP2)
    # Pure API endpoint with strict CORS and rate limiting
    # ============================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name apihms.aurex.in api.hms.aurex.in api-hms.aurex.in;

        # ============================================
        # SSL/TLS Configuration (same as frontend)
        # ============================================
        ssl_certificate /etc/letsencrypt/live/aurexcrt1/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aurexcrt1/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/aurexcrt1/chain.pem;

        ssl_protocols TLSv1.3 TLSv1.2;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:!aNULL:!MD5:!DSS';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_stapling_responder http://ocsp.int-x3.letsencrypt.org;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # ============================================
        # Security Headers (Stricter for API)
        # ============================================
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'none'" always;

        # ============================================
        # CORS Headers (Whitelist Pattern)
        # ============================================
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Correlation-ID, Accept, Origin" always;
        add_header Access-Control-Expose-Headers "X-Correlation-ID, X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset" always;
        add_header Access-Control-Max-Age "86400" always;

        # ============================================
        # Logging
        # ============================================
        access_log /var/log/nginx/hms-api-access.log main;
        access_log /var/log/nginx/hms-api-access.json.log json_combined;
        error_log /var/log/nginx/hms-api-error.log warn;

        # ============================================
        # Locations
        # ============================================

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "HMS API - OK\n";
            add_header Content-Type text/plain;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # CORS preflight handler
        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, X-Correlation-ID, Accept, Origin' always;
                add_header 'Access-Control-Max-Age' '86400' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' '0' always;
                return 204;
            }

            limit_req zone=api_limit burst=100 nodelay;

            proxy_pass http://hms_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;

            # Connection management
            proxy_set_header Connection "";
            proxy_buffering off;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # REST API endpoints
        location /api/v1/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, X-Correlation-ID, Accept, Origin' always;
                add_header 'Access-Control-Max-Age' '86400' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' '0' always;
                return 204;
            }

            limit_req zone=api_limit burst=100 nodelay;

            proxy_pass http://hms_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;

            # Connection management
            proxy_set_header Connection "";
            proxy_buffering off;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # gRPC endpoint (HTTP/2 required)
        location /hms.analytics.AnalyticsService/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://hms_grpc_backend;

            # gRPC requires HTTP/2
            proxy_http_version 2.0;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;

            # gRPC specific headers
            proxy_set_header Content-Type "application/grpc";
            proxy_read_timeout 86400;
            proxy_buffering off;
            proxy_request_buffering off;

            access_log /var/log/nginx/hms-grpc-access.log main;
            error_log /var/log/nginx/hms-grpc-error.log warn;
        }

        # Prometheus metrics endpoint (rate limited)
        location /metrics {
            limit_req zone=metrics_limit burst=10 nodelay;

            proxy_pass http://hms_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Connection management
            proxy_set_header Connection "";
            proxy_buffering off;

            access_log /var/log/nginx/metrics-access.log;
        }

        # WebSocket endpoint
        location /ws/ {
            limit_req zone=general_limit burst=50 nodelay;

            proxy_pass http://hms_backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;

            # WebSocket timeouts (longer for persistent connections)
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;

            # Disable buffering for WebSocket
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ /.git {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ============================================
    # Internal Monitoring Server (Port 8080)
    # Not exposed externally - for internal monitoring only
    # ============================================
    server {
        listen 8080;
        listen [::]:8080;
        server_name localhost 127.0.0.1;

        # Metrics endpoint
        location /metrics {
            access_log off;
            default_type text/plain;
            return 200 "nginx_up 1\n";
        }

        # NGINX stub status endpoint
        location /status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow ::1;
            deny all;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "Healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
